# ProjectT - Пример файла конфигурации
# Скопируйте этот файл в config.yaml и отредактируйте под ваши нужды

# Настройки базы данных
database:
  # Путь к файлу базы данных SQLite
  # По умолчанию: ./storage/projectT.db (относительно расположения exe)
  path: "./storage/projectT.db"
  # Таймаут ожидания при блокировке БД (мс)
  busy_timeout: 30000
  # Максимальное количество открытых соединений
  max_open_conns: 1
  # Максимальное количество простаивающих соединений
  max_idle_conns: 1

# Настройки файлового хранилища
storage:
  # Корневая директория для хранения файлов
  # По умолчанию: ./storage (относительно расположения exe)
  path: "./storage"
  # Поддиректория для файлов контента
  files_dir: "files"

# Настройки P2P сети
p2p:
  # Включён ли P2P режим
  enabled: true
  # Порт для P2P соединений
  port: 4000
  # Использовать relay для обхода NAT
  enable_relay: true
  # Автообнаружение relay
  enable_relay_discovery: true
